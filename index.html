<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>GREEN API Console</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            transition:.3s;
            background:#f5f6fa;
        }

        .dark{
            background:#1e1e1e;
            color:white;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 6px 20px rgba(0,0,0,.1);
        }

        .dark .box{
            background:#2b2b2b;
        }

        textarea{
            height:240px;
            font-family:monospace;
        }

        .loader{
            display:none;
        }

        .history{
            max-height:200px;
            overflow:auto;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="box">

        <div class="d-flex justify-content-between">

            <h4>GREEN API Console</h4>

            <div>

                <button class="btn btn-sm btn-dark" onclick="toggleTheme()">Theme</button>
                <button class="btn btn-sm btn-info" onclick="fillTest()">Fill test</button>

            </div>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-6">

                <label>idInstance</label>
                <input id="idInstance" class="form-control">

            </div>

            <div class="col-md-6">

                <label>ApiTokenInstance</label>
                <input id="apiToken" class="form-control">

            </div>

        </div>

        <hr>

        <h5>Send Message</h5>

        <div class="row">

            <div class="col-md-6">

                <input id="phone" class="form-control" placeholder="Phone number">

            </div>

            <div class="col-md-6">

                <input id="message" class="form-control" placeholder="Message">

            </div>

        </div>

        <hr>

        <h5>Send File By URL</h5>

        <div class="row">

            <div class="col-md-6">

                <input id="fileUrl" class="form-control" placeholder="File URL">

            </div>

            <div class="col-md-6">

                <input id="fileName" class="form-control" placeholder="File name">

            </div>

        </div>

        <hr>

        <div class="d-grid gap-2">

            <button class="btn btn-primary" onclick="getSettings()">getSettings</button>
            <button class="btn btn-secondary" onclick="getState()">getStateInstance</button>
            <button class="btn btn-success" onclick="sendMessage()">sendMessage</button>
            <button class="btn btn-warning" onclick="sendFile()">sendFileByUrl</button>

        </div>

        <div class="text-center mt-3 loader" id="loader">

            <div class="spinner-border"></div>

        </div>

        <hr>

        <div class="d-flex justify-content-between mb-2">

            <h5>API Response</h5>

            <div>

                <button class="btn btn-sm btn-outline-secondary" onclick="copyResponse()">Copy</button>
                <button class="btn btn-sm btn-outline-danger" onclick="clearResponse()">Clear</button>

            </div>

        </div>

        <textarea id="response" class="form-control" readonly></textarea>

        <hr>

        <h6>Request History</h6>

        <div class="history list-group" id="history"></div>

    </div>

</div>

<script>

    loadSaved()

    function toggleTheme(){
        document.body.classList.toggle("dark")
    }

    function loadSaved(){

        let id=localStorage.getItem("idInstance")
        let token=localStorage.getItem("apiToken")

        if(id) idInstance.value=id
        if(token) apiToken.value=token

    }

    function saveParams(){

        localStorage.setItem("idInstance",idInstance.value)
        localStorage.setItem("apiToken",apiToken.value)

    }

    function showLoader(state){
        loader.style.display = state ? "block":"none"
    }

    function showResponse(data){

        response.value=JSON.stringify(data,null,2)

    }

    function copyResponse(){
        navigator.clipboard.writeText(response.value)
    }

    function clearResponse(){
        response.value=""
    }

    function logRequest(method,url){

        let historyBox = document.getElementById("history")

        let el = document.createElement("div")

        el.className = "list-group-item"

        el.innerText =
            `${new Date().toLocaleTimeString()}  ${method}  ${url}`

        historyBox.prepend(el)

    }

    function validate(){

        if(!idInstance.value || !apiToken.value){

            alert("Enter idInstance and ApiTokenInstance")

            return false

        }

        return true

    }

    function validatePhone(phone){

        return /^[0-9]{10,15}$/.test(phone)

    }

    async function request(url,method="GET",body=null){

        showLoader(true)

        logRequest(method,url)

        try{

            let res = await fetch(url,{
                method:method,
                headers:{'Content-Type':'application/json'},
                body: body ? JSON.stringify(body):null
            })

            let text = await res.text()

            let data

            try{

                data = JSON.parse(text)

            }catch{

                data = { raw_response:text }

            }

            showResponse(data)

        }catch(e){

            showResponse({error:e.message})

        }

        showLoader(false)

    }

    function params(){

        if(!validate()) return null

        saveParams()

        return {

            id:idInstance.value,
            token:apiToken.value

        }

    }

    function getSettings(){

        let p=params()

        if(!p) return

        request(`https://api.green-api.com/waInstance${p.id}/getSettings/${p.token}`)

    }

    function getState(){

        let p=params()

        if(!p) return

        request(`https://api.green-api.com/waInstance${p.id}/getStateInstance/${p.token}`)

    }

    function sendMessage(){

        let p=params()

        if(!p) return

        let phone=document.getElementById("phone").value

        if(!validatePhone(phone)){

            alert("Invalid phone")

            return

        }

        let message=document.getElementById("message").value

        request(

            `https://api.green-api.com/waInstance${p.id}/sendMessage/${p.token}`,

            "POST",

            {

                chatId: phone+"@c.us",

                message: message

            }

        )

    }

    function sendFile(){

        let p=params()

        if(!p) return

        let phone=document.getElementById("phone").value

        if(!validatePhone(phone)){

            alert("Invalid phone")

            return

        }

        let urlFile=fileUrl.value
        let fileName=document.getElementById("fileName").value

        request(

            `https://api.green-api.com/waInstance${p.id}/sendFileByUrl/${p.token}`,

            "POST",

            {

                chatId: phone+"@c.us",

                urlFile:urlFile,

                fileName:fileName

            }

        )

    }

    function fillTest(){

        phone.value="31612345678"
        message.value="Hello from GREEN API test"

        fileUrl.value="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"

        fileName.value="test.pdf"

    }

</script>

</body>
</html>
